name: CI
on:
  push:
    branches: [main, 'copilot/**']
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: busquiz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/busquiz_test
      AUTH_SECRET: ci-only-auth-secret-at-least-32-characters
      PLAY_TOKEN_SECRET: ci-only-play-secret-at-least-32-characters
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      UPSTASH_REDIS_REST_URL: https://ci-placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-placeholder-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
